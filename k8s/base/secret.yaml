apiVersion: v1
kind: Secret
metadata:
  name: nrp-accounting-secrets
type: Opaque
stringData:
  # Supports host or host:port (for example clickhouse.example.org:28394).
  CLICKHOUSE_HOST: "replace-me"
  CLICKHOUSE_USER: "replace-me"
  CLICKHOUSE_PASSWORD: "replace-me"
  MCPO_API_KEY: "replace-me"
  XDMOD_ENDPOINT: ""
  XDMOD_AUTH_HEADER: ""
  XDMOD_AUTH_VALUE: ""
