apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nrp-clickhouse-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/djw8605/nrp-clickhouse.git
    targetRevision: main
    path: apps/nrp-clickhouse/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: access-accounting
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
