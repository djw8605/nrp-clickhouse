apiVersion: apps/v1
kind: Deployment
metadata:
  name: nrp-accounting-openapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: openapi
  template:
    metadata:
      labels:
        app.kubernetes.io/component: openapi
    spec:
      serviceAccountName: nrp-accounting-pipeline
      containers:
        - name: openapi
          image: ghcr.io/djw8605/nrp-clickhouse:latest
          imagePullPolicy: Always
          command:
            - mcpo
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --root-path
            - /openapi
            - --api-key
            - $(MCPO_API_KEY)
            - --
            - python
            - -m
            - nrp_accounting_pipeline.mcp_server
          envFrom:
            - configMapRef:
                name: nrp-accounting-config
            - secretRef:
                name: nrp-accounting-secrets
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /openapi/docs
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /openapi/docs
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
