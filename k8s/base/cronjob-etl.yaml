apiVersion: batch/v1
kind: CronJob
metadata:
  name: nrp-accounting-etl
spec:
  schedule: "15 1 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/component: etl
        spec:
          serviceAccountName: nrp-accounting-pipeline
          restartPolicy: OnFailure
          containers:
            - name: etl
              image: ghcr.io/example/nrp-accounting-pipeline:latest
              imagePullPolicy: IfNotPresent
              command: ["python", "etl.py"]
              envFrom:
                - configMapRef:
                    name: nrp-accounting-config
                - secretRef:
                    name: nrp-accounting-secrets
              resources:
                requests:
                  cpu: "500m"
                  memory: "1Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
