apiVersion: v1
kind: ConfigMap
metadata:
  name: nrp-accounting-config
data:
  PROMETHEUS_URL: "http://thanos-query.monitoring.svc.cluster.local:9090"
  PORTAL_RPC_URL: "https://portal.nrp.ai/rpc"
  CLICKHOUSE_DATABASE: "accounting"
  CLICKHOUSE_PORT: "8123"
  CLICKHOUSE_SECURE: "false"
  MAX_QUERY_WORKERS: "8"
  QUERY_STEP: "1h"
  RETRY_LIMIT: "4"
  PROMETHEUS_TIMEOUT_SECONDS: "60"
  PORTAL_TIMEOUT_SECONDS: "60"
  CLICKHOUSE_WRITE_BATCH_SIZE: "5000"
  INSTITUTION_CSV_URL: "https://raw.githubusercontent.com/djw8605/nrp-ror-labeler/refs/heads/main/node-institution.csv"
  MCP_ENABLE_DNS_REBINDING_PROTECTION: "true"
  MCP_ALLOWED_HOSTS: "127.0.0.1:*,localhost:*,nrp-accounting-mcp.nrp-nautilus.io,nrp-accounting-mcp.nrp-nautilus.io:*"
  MCP_ALLOWED_ORIGINS: "http://127.0.0.1:*,http://localhost:*,https://nrp-accounting-mcp.nrp-nautilus.io"
