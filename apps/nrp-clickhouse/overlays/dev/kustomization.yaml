apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: access-accounting

resources:
- ../../../../k8s/base
- sealed-secret.yaml

patches:
- path: configmap.yaml
  target:
    kind: ConfigMap
    name: nrp-accounting-config
- path: mcp-ingress.yaml
  target:
    kind: Ingress
    name: nrp-accounting-mcp
- path: patches.yaml
  target:
    kind: Secret
    name: nrp-accounting-secrets

images:
- name: ghcr.io/djw8605/nrp-clickhouse
  newName: ghcr.io/djw8605/nrp-clickhouse
  newTag: sha-2bd3618aec373c4b8c2a631e96034ec96e219def
