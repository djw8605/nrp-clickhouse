name: ETL Dry-Run Integration Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      prometheus_url:
        description: "Prometheus URL override"
        required: false
        default: "https://prometheus.nrp-nautilus.io"

permissions:
  contents: read

jobs:
  etl-dryrun:
    name: ETL dry-run against NRP Prometheus
    runs-on: ubuntu-latest

    env:
      PROMETHEUS_URL: ${{ github.event.inputs.prometheus_url || 'https://prometheus.nrp-nautilus.io' }}
      PROMETHEUS_TIMEOUT_SECONDS: "90"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install dependencies
        run: pip install -r requirements-test.txt

      - name: Verify Prometheus connectivity
        run: |
          echo "Checking Prometheus at $PROMETHEUS_URL ..."
          curl --fail --silent --max-time 30 \
            "$PROMETHEUS_URL/api/v1/query?query=up" | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print('status:', d['status']); assert d['status']=='success'"

      - name: Check annotation_nrp_ai_username label exists in Prometheus
        run: |
          echo "Running: count by (annotation_nrp_ai_username) (namespace_allocated_resources)"
          RESULT=$(curl --fail --silent --max-time 60 \
            --get \
            --data-urlencode "query=count by (annotation_nrp_ai_username) (namespace_allocated_resources)" \
            "$PROMETHEUS_URL/api/v1/query")
          echo "$RESULT" | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          series = d['data']['result']
          print(f'Total label groups: {len(series)}')
          non_empty = [s for s in series if s['metric'].get('annotation_nrp_ai_username','')]
          print(f'Non-empty annotation_nrp_ai_username values: {len(non_empty)}')
          for s in non_empty[:5]:
              print(f'  username={s[\"metric\"][\"annotation_nrp_ai_username\"]}  count={s[\"value\"][1]}')
          assert len(non_empty) > 0, 'ERROR: annotation_nrp_ai_username has no non-empty values in Prometheus!'
          print('PASS: annotation_nrp_ai_username label is present and populated')
          "

      - name: Run ETL dry-run integration tests
        run: |
          python -m pytest tests/test_etl_dryrun.py \
            --verbose \
            --tb=short \
            --timeout=120 \
            -s \
            2>&1
        env:
          PROMETHEUS_URL: ${{ env.PROMETHEUS_URL }}
          PROMETHEUS_TIMEOUT_SECONDS: ${{ env.PROMETHEUS_TIMEOUT_SECONDS }}

      - name: Print aggregation summary
        if: always()
        run: |
          python3 - <<'EOF'
          import sys, os, json
          from datetime import date, datetime, timedelta, timezone
          sys.path.insert(0, ".")

          from nrp_accounting_pipeline.aggregation import aggregate_daily_metrics, aggregate_namespace_usage

          PROMETHEUS_URL = os.environ.get("PROMETHEUS_URL", "https://prometheus.nrp-nautilus.io").rstrip("/")
          import urllib.request, urllib.parse

          target_date = date.today() - timedelta(days=1)
          end_ts = int(datetime(target_date.year, target_date.month, target_date.day, tzinfo=timezone.utc).timestamp() + 86400)

          query = f"sum_over_time(namespace_allocated_resources[1d:1h]@{end_ts})"
          url = f"{PROMETHEUS_URL}/api/v1/query?" + urllib.parse.urlencode({"query": query})
          with urllib.request.urlopen(url, timeout=90) as r:
              payload = json.load(r)

          series = payload["data"]["result"]
          print(f"\n=== Aggregation Summary for {target_date} ===")
          print(f"Prometheus series returned: {len(series)}")

          annotated = sum(1 for s in series if s.get("metric", {}).get("annotation_nrp_ai_username", ""))
          print(f"Series with annotation_nrp_ai_username: {annotated}")

          results = {"namespace_allocated_resources": payload}
          pod_rows = aggregate_daily_metrics(results, target_date=target_date)
          ns_rows = aggregate_namespace_usage(pod_rows)

          from collections import Counter
          created_by_counts = Counter(r.created_by for r in pod_rows)
          unknown_count = created_by_counts.pop("unknown", 0)
          known_count = sum(created_by_counts.values())

          print(f"\nPodUsageRecords total:          {len(pod_rows)}")
          print(f"  with known created_by:         {known_count}")
          print(f"  with created_by='unknown':     {unknown_count}")
          print(f"NamespaceUsageRecords total:     {len(ns_rows)}")

          print(f"\nTop created_by values:")
          for user, count in created_by_counts.most_common(10):
              print(f"  {user}: {count} rows")

          resources = Counter(r.resource for r in pod_rows)
          print(f"\nResource breakdown:")
          for res, count in resources.most_common():
              print(f"  {res}: {count} rows")

          if unknown_count == len(pod_rows):
              print("\nWARNING: All rows have created_by='unknown' — annotation mapping may not be working!")
              sys.exit(1)
          else:
              print(f"\nSUCCESS: {known_count}/{len(pod_rows)} rows have a non-unknown created_by")
          EOF
        env:
          PROMETHEUS_URL: ${{ env.PROMETHEUS_URL }}
