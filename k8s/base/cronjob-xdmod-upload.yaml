apiVersion: batch/v1
kind: CronJob
metadata:
  name: nrp-accounting-xdmod-upload
spec:
  schedule: "15 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 3
      ttlSecondsAfterFinished: 86400
      template:
        metadata:
          labels:
            app.kubernetes.io/component: xdmod-upload
        spec:
          serviceAccountName: nrp-accounting-pipeline
          restartPolicy: OnFailure
          containers:
            - name: xdmod-upload
              image: ghcr.io/djw8605/nrp-clickhouse:latest
              imagePullPolicy: Always
              command: ["python", "xdmod_upload.py", "--require-data"]
              envFrom:
                - configMapRef:
                    name: nrp-accounting-config
                - secretRef:
                    name: nrp-accounting-secrets
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "1"
                  memory: "1Gi"
