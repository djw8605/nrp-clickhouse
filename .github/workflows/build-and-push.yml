name: Build and Publish Container

on:
  push:
    branches:
      - main
    tags:
      - "v*"
    paths-ignore:
      - "apps/nrp-clickhouse/overlays/dev/kustomization.yaml"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMAGE_NAME: ghcr.io/djw8605/nrp-clickhouse
      DEPLOY_IMAGE_TAG: sha-${{ github.sha }}
      DEPLOY_KUSTOMIZATION_DIR: apps/nrp-clickhouse/overlays/dev

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=sha-,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up Kustomize
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: imranismail/setup-kustomize@v2
        with:
          kustomize-version: "5.4.3"

      - name: Update deployment image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          cd "${DEPLOY_KUSTOMIZATION_DIR}"
          kustomize edit set image "${IMAGE_NAME}=${IMAGE_NAME}:${DEPLOY_IMAGE_TAG}"

      - name: Validate deployment overlay
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: kustomize build "${DEPLOY_KUSTOMIZATION_DIR}" >/dev/null

      - name: Commit deployment image tag
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "${DEPLOY_KUSTOMIZATION_DIR}/kustomization.yaml"
          if git diff --cached --quiet; then
            echo "Deployment image tag is already up to date."
          else
            git commit -m "chore(deploy): update image to ${DEPLOY_IMAGE_TAG}"
            git push
          fi
